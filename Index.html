<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>Project Location Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { 
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --streetview: #ff9800;
        }

        html, body { 
            height: 100%; margin: 0; 
            font-family: 'Sarabun', 'Inter', sans-serif; 
            background-color: var(--slate-50); 
            color: var(--slate-800);
            -webkit-font-smoothing: antialiased;
        }

        .app-view { display: none; width: 100%; max-width: 600px; animation: fadeIn 0.2s ease-out; }
        .app-view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body { display: flex; align-items: flex-start; justify-content: center; padding: 1rem; }

        .main-card { 
            background-color: white; 
            border-radius: 1.25rem;
            border: 1px solid var(--slate-200);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: visible;
        }

        #map-container { position: relative; width: 100%; border-radius: 0.75rem; overflow: hidden; border: 1px solid var(--slate-200); }
        #map, #dashboard-map { height: 400px; width: 100%; background-color: var(--slate-100); }

        @media (max-width: 640px) {
            #map, #dashboard-map { height: 380px; }
            body { padding: 0.5rem; }
        }

        /* Coords Display Overlay */
        .map-coords-overlay {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            font-weight: bold;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            pointer-events: none;
            display: flex;
            gap: 10px;
            white-space: nowrap;
        }

        #messageBox, #loadingSpinner { 
            position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); 
            z-index: 9999; padding: 0.75rem 1.25rem; border-radius: 2rem; 
            font-size: 0.875rem; font-weight: 600; display: flex; align-items: center; gap: 0.6rem; 
            width: max-content; max-width: 90%;
        }
        #loadingSpinner { display: none; background: var(--slate-800); color: white; }

        .modal-overlay { 
            position: fixed; inset: 0; background-color: rgba(15, 23, 42, 0.6); 
            display: none; align-items: center; justify-content: center; z-index: 9998; 
            backdrop-filter: blur(4px); padding: 1.5rem;
        }
        .modal-content { 
            background-color: white; border-radius: 1.25rem; padding: 1.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); 
            max-width: 400px; width: 100%;
        }

        .btn { 
            min-height: 44px; font-size: 0.9375rem; font-weight: 600;
            border-radius: 0.75rem; border: 1px solid transparent; 
            transition: all 0.2s ease; 
            display: flex; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer;
        }
        .btn:disabled { opacity: 0.5; cursor: wait; }
        
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { background-color: white; color: var(--slate-600); border-color: var(--slate-200); }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-streetview { background-color: var(--streetview); color: white; }

        /* History Rows */
        .history-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--slate-100);
            gap: 12px;
        }
        .history-info { display: flex; flex-direction: column; min-width: 0; }
        .history-id { font-weight: 700; font-size: 14px; color: var(--slate-800); }
        .history-meta { font-size: 11px; color: var(--slate-400); display: flex; gap: 8px; }
        .history-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .action-icon-btn {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 14px; transition: all 0.2s;
        }

        /* Toggle Search UI */
        .leaflet-search-control {
            background: transparent; margin-top: 10px !important; margin-left: 10px !important;
            z-index: 1001 !important; pointer-events: auto;
        }
        .leaflet-search-container {
            display: flex; align-items: center; background: white; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid rgba(0,0,0,0.1);
            transition: width 0.3s ease; width: 44px; overflow: hidden;
        }
        .leaflet-search-container.expanded { width: 300px; max-width: calc(100vw - 110px); }
        .leaflet-search-input {
            border: none !important; padding: 10px 14px !important; width: 100%;
            font-size: 15px !important; outline: none !important; min-height: 44px !important;
            display: none; background: transparent;
        }
        .leaflet-search-container.expanded .leaflet-search-input { display: block; }
        .leaflet-search-btn {
            background: none; border: none; padding: 10px; cursor: pointer; color: var(--primary); display: flex; align-items: center; justify-content: center; width: 44px; flex-shrink: 0;
        }
        .leaflet-search-clear {
            background: none; border: none; padding: 10px; cursor: pointer; color: var(--slate-400); display: none; align-items: center; justify-content: center; width: 40px; flex-shrink: 0;
        }
        .leaflet-search-container.expanded .leaflet-search-clear { display: flex; }

        .map-autocomplete-list {
            background: white; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            max-height: 300px; overflow-y: auto; margin-top: 8px; display: none;
            border: 1px solid var(--slate-200); position: absolute; width: 100%;
        }
        .autocomplete-item {
            padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--slate-50);
            text-align: left; display: flex; flex-direction: column;
        }
        .autocomplete-item:hover { background-color: var(--slate-50); }
        .autocomplete-item .main-name { font-weight: 700; font-size: 14px; color: var(--slate-900); }
        .autocomplete-item .sub-name { font-size: 11px; color: var(--slate-500); }
        .autocomplete-item .tag { font-size: 9px; font-weight: bold; background: var(--primary); color: white; padding: 1px 5px; border-radius: 4px; width: fit-content; margin-bottom: 3px; }

        .leaflet-locate-control {
            background: white; border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--primary); margin-bottom: 15px !important; margin-left: 12px !important;
        }
        
        .searching-hint { padding: 15px; font-size: 12px; color: var(--slate-400); text-align: center; }

        /* Lock Input Styles */
        .input-with-action { position: relative; display: flex; align-items: center; width: 100%; }
        .input-with-action input:disabled { background-color: var(--slate-100); color: var(--slate-500); cursor: not-allowed; }
        .btn-lock-action {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 12px; color: var(--slate-400);
            background: transparent; border: none; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-lock-action.locked { color: var(--primary); background: var(--slate-100); }
    </style>
</head>
<body>
    <div id="app-container" class="w-full flex justify-center">
        
        <!-- View 1: โครงการ -->
        <div id="project-selection-view" class="app-view active">
            <div class="main-card">
                <div class="p-5 sm:p-8">
                    <div class="text-center mb-8">
                        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-100 text-blue-600 mb-4">
                            <i class="fas fa-location-dot text-2xl"></i>
                        </div>
                        <h1 class="text-2xl font-bold text-slate-900">ระบบบันทึกพิกัด</h1>
                        <p class="text-slate-500 text-sm mt-1">กรุณาเลือกโครงการ</p>
                    </div>
                    
                    <div class="mb-6">
                        <div class="relative">
                            <input id="project-search-input" type="text" placeholder="ค้นหาโครงการ..." class="pl-11 w-full bg-slate-50 border-slate-200 rounded-xl h-12">
                            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center mb-4 px-1">
                        <span id="project-count" class="text-xs font-bold text-slate-400 uppercase tracking-widest">0 โครงการ</span>
                        <button id="manage-projects-btn" class="btn btn-secondary !w-11 !h-11 !p-0 rounded-xl" title="ตั้งค่าระบบ"><i class="fas fa-sliders"></i></button>
                    </div>

                    <div id="project-list" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- View: แอดมิน -->
        <div id="admin-menu-view" class="app-view">
            <div class="main-card">
                <div class="p-5">
                    <div class="flex justify-between items-start mb-8">
                        <h2 class="text-xl font-bold text-slate-900">การควบคุมระบบ</h2>
                        <button id="menu-back-to-selection-btn" class="btn btn-secondary !w-11 !h-11 !p-0"><i class="fas fa-chevron-left"></i></button>
                    </div>
                    <div class="grid gap-4">
                        <button id="goto-manage-projects-btn" class="w-full btn btn-secondary !justify-start p-4 border-slate-200 hover:bg-blue-50 group">
                            <div class="w-11 h-11 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center mr-4 group-hover:bg-blue-600 group-hover:text-white transition-colors"><i class="fas fa-folder-tree"></i></div>
                            <div class="text-left"><span class="block font-bold text-slate-800">จัดการโครงการ</span><span class="block text-xs text-slate-400">สร้าง ลบ และเปลี่ยนชื่อ</span></div>
                        </button>
                        <button id="goto-dashboards-btn" class="w-full btn btn-secondary !justify-start p-4 border-slate-200 hover:bg-emerald-50 group">
                            <div class="w-11 h-11 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center mr-4 group-hover:bg-emerald-600 group-hover:text-white transition-colors"><i class="fas fa-chart-pie"></i></div>
                            <div class="text-left"><span class="block font-bold text-slate-800">รายงานข้อมูลสรุป</span></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- View 3: Tracker -->
        <div id="tracker-view" class="app-view">
            <div class="main-card">
                <div class="p-0">
                    <!-- Header -->
                    <div class="flex items-center justify-between p-4 bg-white border-b border-slate-100 sticky top-0 z-[1000]">
                        <button id="home-button" class="btn btn-secondary !w-11 !h-11 !p-0"><i class="fas fa-house-chimney"></i></button>
                        <div class="flex-grow px-3 text-center overflow-hidden">
                            <h3 id="tracker-title" class="text-sm font-bold text-slate-700 truncate">โครงการ</h3>
                        </div>
                        <button id="customizeLabelsBtn" class="btn btn-secondary !w-11 !h-11 !p-0"><i class="fas fa-gear"></i></button>
                    </div>
                    
                    <div class="p-4 space-y-4">
                        <!-- แผนที่พร้อมพิกัดลอย -->
                        <div id="map-container" class="shadow-sm">
                            <div id="map"></div>
                            <div class="map-coords-overlay">
                                <span>LAT: <span id="lat">--</span></span>
                                <span>LNG: <span id="lng">--</span></span>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-row">
                                <label id="employeeIdLabel" class="text-xs font-bold text-slate-500 mb-1 block">ID พนักงาน</label>
                                <div class="input-with-action">
                                    <input id="employeeIdInput" type="text" inputmode="numeric" placeholder="ระบุรหัส" class="w-full border border-slate-200 rounded-xl p-2 h-11 px-4 pr-10">
                                    <button id="toggleEmpLockBtn" class="btn-lock-action"><i class="fas fa-lock-open" id="empLockIcon"></i></button>
                                </div>
                            </div>
                            <div class="input-row">
                                <label id="surveyIdLabel" class="text-xs font-bold text-slate-500 mb-1 block">ID สำรวจ</label>
                                <input id="surveyIdInput" type="text" inputmode="numeric" placeholder="ระบุรหัส" class="w-full border border-slate-200 rounded-xl p-2 h-11 px-4">
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div id="normalActionButtons" class="flex gap-3">
                            <button id="saveButton" class="flex-grow btn btn-success py-3 shadow-lg"><i class="fas fa-bookmark"></i> บันทึกข้อมูล</button>
                            <button id="uploadButton" class="btn btn-warning !w-14 !p-0 shadow-lg" title="ซิงค์ข้อมูล"><i class="fas fa-cloud-arrow-up text-lg"></i></button>
                        </div>

                        <div id="editActionButtons" class="hidden flex flex-col gap-3">
                            <button id="confirmEditButton" class="btn btn-warning py-3">อัปเดตการแก้ไข</button>
                            <button id="cancelEditButton" class="btn btn-secondary py-3">ยกเลิก</button>
                        </div>

                        <div class="pt-2">
                            <div class="flex items-center justify-between mb-2 border-b border-slate-100 pb-2">
                                <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">ประวัติการบันทึก</h4>
                                <button id="exportCsvButton" class="btn btn-secondary !min-height-0 !h-8 !px-3 !text-xs" title="ส่งออก CSV"><i class="fas fa-file-csv mr-1"></i> CSV</button>
                            </div>
                            <div id="saved-locations-container" class="divide-y divide-slate-50"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="passwordModal" class="modal-overlay">
        <div class="modal-content">
            <div class="text-center space-y-4">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto text-slate-600"><i class="fas fa-lock text-2xl"></i></div>
                <h4 class="text-xl font-bold">ยืนยันตัวตน</h4>
                <form id="password-form" class="space-y-4">
                    <input id="password-input" type="password" class="text-center tracking-widest w-full h-12 border border-slate-200 rounded-xl px-4" placeholder="••••••••" required>
                    <div class="flex flex-col gap-2">
                        <button type="submit" class="btn btn-primary w-full h-12">ตกลง</button>
                        <button type="button" id="cancel-password-btn" class="btn btn-secondary w-full">ยกเลิก</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <div id="confirmationModal" class="modal-overlay">
        <div class="modal-content">
            <div class="text-center space-y-6">
                <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-triangle-exclamation text-2xl"></i></div>
                <div><h4 id="modalTitle" class="text-lg font-bold mb-2">ยืนยัน?</h4><p id="modalMessage" class="text-slate-500 text-sm leading-relaxed"></p></div>
                <div class="flex flex-col gap-3"><button id="confirmActionButton" class="btn btn-danger w-full h-12">ตกลง</button><button id="cancelActionButton" class="btn btn-secondary w-full h-12">ยกเลิก</button></div>
            </div>
        </div>
    </div>

    <div id="messageBox"></div>
    <div id="loadingSpinner"><i class="fas fa-circle-notch fa-spin"></i><span>กำลังประมวลผล...</span></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwZ5OAvjvi2vVbE1XGIF8-3m7nz0PzrBHw9kNWmiBhs_cay3vVCBCtOWaF9zquH7mHt/exec'; 
        
        let googleStreets = null, googleHybrid = null;
        let redIcon = null, yellowIcon = null, blueIcon = null, greenIcon = null;

        const state = {
            map: null, currentMarker: null, permanentMarkers: null, permanentMarkersMap: {},
            currentLat: null, currentLng: null, editingId: null,
            savedLocations: [], pendingLocations: [], currentProjectName: null, allProjects: [],
            isEmployeeIdLocked: !!localStorage.getItem('employeeId'),
            customLabels: JSON.parse(localStorage.getItem('customLabels')) || { employeeId: 'ID พนักงาน', surveyId: 'ID สำรวจ' }
        };

        const dom = {
            views: document.querySelectorAll(".app-view"),
            loading: document.getElementById("loadingSpinner"),
            message: document.getElementById("messageBox"),
            projectList: document.getElementById("project-list"),
            projectCount: document.getElementById("project-count"),
            trackerTitle: document.getElementById("tracker-title"),
            savedContainer: document.getElementById("saved-locations-container"),
            empIdInput: document.getElementById("employeeIdInput"),
            surveyIdInput: document.getElementById("surveyIdInput"),
            modals: { confirm: document.getElementById("confirmationModal"), password: document.getElementById("passwordModal") }
        };

        // --- UTILS ---
        const setLoading = (isLoading) => { dom.loading.style.display = isLoading ? "flex" : "none"; };
        const on = (id, event, handler) => { const el = document.getElementById(id); if (el) el.addEventListener(event, handler); };
        const safeText = (val) => { const span = document.createElement('span'); span.textContent = val || ''; return span.innerHTML; };
        const csvEscape = (v) => `"${String(v ?? '').replace(/"/g, '""')}"`;
        const getStreetViewLink = (lat, lng) => `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lng}`;
        const isValidCoord = (val) => (val !== null && val !== undefined && val !== '' && !isNaN(parseFloat(val)));

        const isDuplicate = (empId, surId, excludeId = null) => {
            const nEmp = String(empId).trim().toLowerCase();
            const nSur = String(surId).trim().toLowerCase();
            const all = [...state.savedLocations, ...state.pendingLocations];
            return all.some(loc => {
                if (excludeId && String(loc.ID) === String(excludeId)) return false;
                return String(loc.EmployeeID || '').trim().toLowerCase() === nEmp && String(loc.SurveyID || '').trim().toLowerCase() === nSur;
            });
        };

        function showMessage(msg, type = "info") {
            dom.message.textContent = msg;
            const colors = { success: ["bg-emerald-600", "text-white"], error: ["bg-rose-600", "text-white"], warning: ["bg-amber-500", "text-white"] };
            dom.message.className = "fixed top-1 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-full shadow-lg font-bold " + (colors[type] || ["bg-blue-600", "text-white"]).join(" ");
            dom.message.style.display = "flex";
            setTimeout(() => { dom.message.style.display = "none"; }, 4000);
        }

        async function apiPost(payload) {
            setLoading(true);
            try {
                const res = await fetch(WEB_APP_URL, { method: "POST", mode: "cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
                const result = await res.json();
                if (!result.success && result.status !== 'success') throw new Error(result.message || "การดำเนินการล้มเหลว");
                return result;
            } catch (err) { showMessage(err.message, "error"); throw err; } 
            finally { setLoading(false); }
        }

        // --- MAP & GEOLOCATION ---
        function initLeafletResources() {
            if (typeof L === 'undefined') return false;
            googleStreets = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Map &copy; Google' });
            googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Map &copy; Google' });
            const iconOpts = { shadowUrl: "https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png", iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] };
            redIcon = new L.Icon({ ...iconOpts, iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png" });
            yellowIcon = new L.Icon({ ...iconOpts, iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-yellow.png" });
            blueIcon = new L.Icon({ ...iconOpts, iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png" });
            greenIcon = new L.Icon({ ...iconOpts, iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png" });
            state.permanentMarkers = L.layerGroup();
            return true;
        }

        function initMap() {
            if (state.map || !googleStreets) return;
            state.map = L.map("map", { layers: [googleStreets], zoomControl: false }).setView([13.75, 100.5], 10);
            L.control.zoom({ position: 'bottomright' }).addTo(state.map);
            L.control.layers({"ถนน": googleStreets, "ดาวเทียม": googleHybrid}, null, { position: 'bottomright' }).addTo(state.map);

            const SearchControl = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function() {
                    const container = L.DomUtil.create('div', 'leaflet-search-control');
                    container.innerHTML = `
                        <div class="leaflet-search-container shadow-md">
                            <button class="leaflet-search-btn" title="คลิกเพื่อค้นหา"><i class="fas fa-search"></i></button>
                            <input type="text" class="leaflet-search-input" placeholder="ค้นหาซอย หรือ รหัส...">
                            <button class="leaflet-search-clear"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="map-autocomplete-list"></div>
                    `;
                    const wrapper = container.querySelector('.leaflet-search-container');
                    const input = container.querySelector('.leaflet-search-input');
                    const btn = container.querySelector('.leaflet-search-btn');
                    const clearBtn = container.querySelector('.leaflet-search-clear');
                    const list = container.querySelector('.map-autocomplete-list');
                    let searchTimeout = null;

                    L.DomEvent.on(btn, 'click', () => {
                        if (!wrapper.classList.contains('expanded')) {
                            wrapper.classList.add('expanded');
                            setTimeout(() => input.focus(), 100);
                        }
                    });

                    L.DomEvent.on(input, 'input', () => {
                        const q = input.value;
                        clearTimeout(searchTimeout);
                        if (q.trim().length >= 2) {
                            list.innerHTML = '<div class="searching-hint">กำลังค้นหาแบบละเอียด...</div>';
                            list.style.display = 'block';
                            searchTimeout = setTimeout(() => searchMapLocation(q, list, input), 600);
                        } else list.style.display = 'none';
                    });

                    L.DomEvent.on(clearBtn, 'click', () => {
                        if (input.value) { input.value = ""; list.style.display = 'none'; } 
                        else { wrapper.classList.remove('expanded'); list.style.display = 'none'; }
                    });

                    L.DomEvent.disableClickPropagation(container);
                    return container;
                }
            });
            state.map.addControl(new SearchControl());

            const LocateControl = L.Control.extend({
                options: { position: 'bottomleft' },
                onAdd: function() {
                    const button = L.DomUtil.create('button', 'leaflet-locate-control');
                    button.innerHTML = '<i class="fas fa-crosshairs"></i>';
                    L.DomEvent.on(button, 'click', (e) => { 
                        L.DomEvent.stopPropagation(e);
                        handleGetLocation();
                    });
                    L.DomEvent.disableClickPropagation(button);
                    return button;
                }
            });
            state.map.addControl(new LocateControl());
            state.permanentMarkers.addTo(state.map);
            state.map.on("click", e => updateMarker(e.latlng.lat, e.latlng.lng));
        }

        async function handleGetLocation() {
            setLoading(true);
            navigator.geolocation.getCurrentPosition(p => {
                updateMarker(p.coords.latitude, p.coords.longitude);
                state.map.setView([p.coords.latitude, p.coords.longitude], 18);
                showMessage("ระบุตำแหน่งปัจจุบันแล้ว", "success");
                setLoading(false);
            }, (err) => {
                let msg = "เปิด GPS และอนุญาตการเข้าถึงก่อนใช้งาน";
                if (err.code === 1) msg = "กรุณาอนุญาต (Allow) การเข้าถึงพิกัด";
                if (err.code === 3) msg = "สัญญาณ GPS อ่อน กรุณาลองใหม่อีกครั้ง";
                showMessage(msg, "error");
                setLoading(false);
            }, {enableHighAccuracy: true, timeout: 15000, maximumAge: 0});
        }

        async function searchMapLocation(q, listElement, inputElement) {
            listElement.innerHTML = "";
            const query = q.toLowerCase();
            const allData = [...state.savedLocations, ...state.pendingLocations];
            
            // 1. Map Data Match
            const localMatches = allData.filter(d => String(d.EmployeeID).toLowerCase().includes(query));
            if (localMatches.length > 0) {
                localMatches.slice(0, 3).forEach(item => {
                    const div = document.createElement("div");
                    div.className = "autocomplete-item";
                    div.innerHTML = `<div class="tag">พิกัดเดิม</div><span class="main-name">${safeText(item.EmployeeID)}</span><span class="sub-name">SID: ${safeText(item.SurveyID)}</span>`;
                    L.DomEvent.on(div, 'click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        updateMarker(item.Latitude, item.Longitude);
                        state.map.setView([item.Latitude, item.Longitude], 18);
                        listElement.style.display = 'none';
                    });
                    listElement.appendChild(div);
                });
            }

            // 2. Nominatim Deep Search (Detailed Thai Addr)
            try {
                const center = state.map.getCenter();
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&accept-language=th&limit=8&lat=${center.lat}&lon=${center.lng}&addressdetails=1&zoom=18&countrycodes=th`;
                const res = await fetch(url);
                const data = await res.json();
                if (data && data.length > 0) {
                    data.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "autocomplete-item";
                        const main = item.display_name.split(',')[0];
                        const sub = item.display_name.split(',').slice(1,4).join(',');
                        div.innerHTML = `<span class="main-name">${safeText(main)}</span><span class="sub-name">${safeText(sub)}</span>`;
                        L.DomEvent.on(div, 'click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            updateMarker(parseFloat(item.lat), parseFloat(item.lon));
                            state.map.setView([item.lat, item.lon], 18);
                            inputElement.value = main;
                            listElement.style.display = 'none';
                        });
                        listElement.appendChild(div);
                    });
                }
            } catch (err) {}
            if (listElement.children.length === 0) listElement.innerHTML = '<div class="searching-hint">ไม่พบข้อมูล</div>';
        }

        function updateMarker(lat, lng) {
            const svUrl = getStreetViewLink(lat, lng);
            const popupContent = `<div class="text-center space-y-2"><p class="font-bold text-slate-800 text-xs">พิกัดที่คุณเลือก</p><a href="${svUrl}" target="_blank" class="btn btn-streetview w-full !min-height-0 py-2 text-[10px]"><i class="fas fa-street-view"></i> ดู Street View</a></div>`;
            if (state.currentMarker) state.currentMarker.setLatLng([lat, lng]).setPopupContent(popupContent);
            else {
                state.currentMarker = L.marker([lat, lng], { icon: state.editingId ? yellowIcon : redIcon, draggable: true }).addTo(state.map);
                state.currentMarker.bindPopup(popupContent);
                state.currentMarker.on("dragend", e => updateMarker(e.target.getLatLng().lat, e.target.getLatLng().lng));
            }
            state.currentLat = lat; state.currentLng = lng;
            const la = document.getElementById("lat"), ln = document.getElementById("lng");
            if(la) la.textContent = parseFloat(lat).toFixed(5); if(ln) ln.textContent = parseFloat(lng).toFixed(5);
        }

        function clearMarker() {
            if (state.currentMarker) { state.map.removeLayer(state.currentMarker); state.currentMarker = null; }
            state.currentLat = null; state.currentLng = null;
            const la = document.getElementById("lat"), ln = document.getElementById("lng");
            if(la) la.textContent = "--"; if(ln) ln.textContent = "--";
        }

        function fitMapToMarkers() {
            if (!state.map) return;
            const markers = [];
            state.permanentMarkers.eachLayer(layer => { if (layer instanceof L.Marker) markers.push(layer.getLatLng()); });
            if (markers.length > 0) {
                const bounds = L.latLngBounds(markers);
                state.map.fitBounds(bounds, { padding: [40, 40], maxZoom: 17 });
            }
        }

        // --- FIELD LOCK LOGIC ---
        function applyEmployeeIdState() {
            const storedId = localStorage.getItem('employeeId');
            if (storedId) dom.empIdInput.value = storedId;
            const btn = document.getElementById('toggleEmpLockBtn');
            const icon = document.getElementById('empLockIcon');
            if (state.isEmployeeIdLocked) { dom.empIdInput.disabled = true; btn.classList.add('locked'); icon.className = 'fas fa-lock'; }
            else { dom.empIdInput.disabled = false; btn.classList.remove('locked'); icon.className = 'fas fa-lock-open'; }
        }

        function toggleEmployeeIdLock() {
            const val = dom.empIdInput.value.trim();
            if (!state.isEmployeeIdLocked && !val) return showMessage("ระบุรหัสพนักงานก่อนล็อก", "warning");
            state.isEmployeeIdLocked = !state.isEmployeeIdLocked;
            if (state.isEmployeeIdLocked) localStorage.setItem('employeeId', val);
            applyEmployeeIdState();
            showMessage(state.isEmployeeIdLocked ? "ล็อกรหัสแล้ว" : "ปลดล็อกแล้ว", "info");
        }

        function updateAllLabels() {
            const eLabel = document.getElementById('employeeIdLabel'), sLabel = document.getElementById('surveyIdLabel');
            if (eLabel) eLabel.textContent = state.customLabels.employeeId;
            if (sLabel) sLabel.textContent = state.customLabels.surveyId;
            if (dom.empIdInput) dom.empIdInput.placeholder = "ระบุ" + state.customLabels.employeeId;
            if (dom.surveyIdInput) dom.surveyIdInput.placeholder = "ระบุ" + state.customLabels.surveyId;
        }

        function showView(viewId) {
            dom.views.forEach(v => v.classList.remove("active"));
            const target = document.getElementById(viewId);
            if(target) target.classList.add("active");
            if (state.map) setTimeout(() => state.map.invalidateSize(), 200);
            updateAllLabels();
            if (viewId === 'tracker-view') applyEmployeeIdState();
        }

        async function fetchLocations(projectName) {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getData&project=${encodeURIComponent(projectName)}&t=${Date.now()}`);
                const result = await res.json();
                if (result.success || result.status === 'success') {
                    state.savedLocations = result.data || [];
                    renderAllData();
                    fitMapToMarkers();
                }
            } catch (e) {}
        }

        function renderAllData() {
            const all = [...state.savedLocations, ...state.pendingLocations];
            if (state.permanentMarkers) state.permanentMarkers.clearLayers();
            state.permanentMarkersMap = {};
            
            all.forEach(loc => {
                const lat = parseFloat(loc.Latitude), lng = parseFloat(loc.Longitude);
                if (isValidCoord(lat) && isValidCoord(lng) && state.permanentMarkers) {
                    const icon = loc.isPending ? greenIcon : blueIcon;
                    const marker = L.marker([lat, lng], { icon }).addTo(state.permanentMarkers);
                    marker.on('click', () => { updateMarker(lat, lng); showMessage("เลือกพิกัดจากหมุดนี้แล้ว"); });
                    const svUrl = getStreetViewLink(lat, lng);
                    marker.bindPopup(`<div class="text-center space-y-2"><b class="block mb-1">${safeText(loc.EmployeeID)}</b><a href="${svUrl}" target="_blank" class="btn btn-streetview !min-height-0 py-1.5 text-[10px]"><i class="fas fa-street-view"></i> Street View</a></div>`);
                    state.permanentMarkersMap[loc.ID] = marker;
                }
            });

            dom.savedContainer.innerHTML = "";
            const sorted = all.slice().sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));
            sorted.forEach((loc) => {
                const row = document.createElement("div");
                row.className = "history-row";
                const timeStr = loc.Timestamp ? new Date(loc.Timestamp).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                const statusIcon = loc.isPending ? '<i class="fas fa-clock text-amber-500 ml-1"></i>' : '';
                row.innerHTML = `<div class="history-info"><div class="history-id truncate">${safeText(loc.EmployeeID)} ${statusIcon}</div><div class="history-meta"><span>${timeStr}</span><span class="truncate">SID: ${safeText(loc.SurveyID || '-')}</span></div></div><div class="history-actions"><a href="${loc.GoogleMapsLink || '#'}" target="_blank" class="action-icon-btn text-blue-500 bg-blue-50" title="แผนที่"><i class="fas fa-map-marker-alt"></i></a><a href="${getStreetViewLink(loc.Latitude, loc.Longitude)}" target="_blank" class="action-icon-btn text-amber-600 bg-amber-50" title="Street View"><i class="fas fa-street-view"></i></a><button class="edit-btn action-icon-btn text-slate-400 bg-slate-50" title="แก้ไข"><i class="fas fa-pen"></i></button><button class="del-btn action-icon-btn text-rose-500 bg-rose-50" title="ลบ"><i class="fas fa-trash-can"></i></button></div>`;
                row.querySelector(".edit-btn").onclick = () => startEdit(loc.ID);
                row.querySelector(".del-btn").onclick = () => deleteLocation(loc.ID, loc.EmployeeID);
                dom.savedContainer.appendChild(row);
            });
        }

        function startEdit(id) {
            const loc = state.pendingLocations.find(l => String(l.ID) === String(id)) || state.savedLocations.find(l => String(l.ID) === String(id));
            if (!loc) return;
            if (state.editingId) cancelEdit();
            state.editingId = id;
            if (state.permanentMarkersMap[id] && state.map) state.map.removeLayer(state.permanentMarkersMap[id]);
            updateMarker(parseFloat(loc.Latitude), parseFloat(loc.Longitude));
            if (state.map) state.map.setView([parseFloat(loc.Latitude), parseFloat(loc.Longitude)], 18);
            dom.empIdInput.disabled = false; dom.empIdInput.value = loc.EmployeeID; dom.surveyIdInput.value = loc.SurveyID || '';
            document.getElementById("editActionButtons").classList.remove("hidden");
            document.getElementById("normalActionButtons").classList.add("hidden");
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteLocation(id, name) {
            dom.modals.confirm.querySelector("#modalMessage").textContent = `ต้องการลบข้อมูล "${name}"?`;
            state.confirmActionCallback = async () => {
                setLoading(true);
                try {
                    if (String(id).startsWith('pending_')) { state.pendingLocations = state.pendingLocations.filter(p => String(p.ID) !== String(id)); renderAllData(); }
                    else { await apiPost({ action: "delete", project: state.currentProjectName, id: id }); await fetchLocations(state.currentProjectName); }
                } catch (err) {} finally { setLoading(false); dom.modals.confirm.style.display = "none"; }
            };
            dom.modals.confirm.style.display = "flex";
        }

        function setupListeners() {
            on("toggleEmpLockBtn", "click", toggleEmployeeIdLock);
            on("employeeIdInput", "blur", () => {
                const val = dom.empIdInput.value.trim();
                if (val && !state.isEmployeeIdLocked) {
                    state.isEmployeeIdLocked = true;
                    localStorage.setItem('employeeId', val);
                    applyEmployeeIdState();
                    showMessage("ล็อกรหัสพนักงานอัตโนมัติแล้ว");
                }
            });
            on("saveButton", "click", async () => {
                if (state.currentLat === null) return showMessage("เลือกพิกัดก่อน", "warning");
                const empId = dom.empIdInput.value.trim(), surId = dom.surveyIdInput.value.trim();
                if (!empId) return showMessage("ใส่ ID พนักงาน", "warning");
                if (isDuplicate(empId, surId, state.editingId)) return showMessage("ข้อมูลซ้ำ", "warning");
                if (state.editingId) {
                    if (String(state.editingId).startsWith('pending_')) {
                        const idx = state.pendingLocations.findIndex(l => String(l.ID) === String(state.editingId));
                        if (idx > -1) { state.pendingLocations[idx] = { ...state.pendingLocations[idx], EmployeeID: empId, SurveyID: surId, Latitude: state.currentLat, Longitude: state.currentLng, GoogleMapsLink: `https://maps.google.com/?q=${state.currentLat},${state.currentLng}` }; }
                    } else { await apiPost({ action: "update", id: state.editingId, project: state.currentProjectName, data: { name: empId, surveyId: surId, lat: state.currentLat, lng: state.currentLng } }); await fetchLocations(state.currentProjectName); }
                    cancelEdit();
                } else {
                    state.pendingLocations.push({ ID: `pending_${Date.now()}`, EmployeeID: empId, SurveyID: surId, Latitude: state.currentLat, Longitude: state.currentLng, Timestamp: new Date().toISOString(), GoogleMapsLink: `https://maps.google.com/?q=${state.currentLat},${state.currentLng}`, isPending: true });
                    if (!state.isEmployeeIdLocked) { state.isEmployeeIdLocked = true; localStorage.setItem('employeeId', empId); applyEmployeeIdState(); }
                    dom.surveyIdInput.value = ""; clearMarker(); renderAllData(); showMessage("บันทึกแล้ว", "success");
                }
            });
            on("confirmEditButton", "click", () => document.getElementById("saveButton").click());
            on("cancelEditButton", "click", cancelEdit);
            on("uploadButton", "click", async () => {
                if (!state.pendingLocations.length) return showMessage("ไม่มีข้อมูลรอซิงค์", "info");
                for (const loc of [...state.pendingLocations]) {
                    try { const res = await apiPost({ action: "add", project: state.currentProjectName, data: { name: loc.EmployeeID, surveyId: loc.SurveyID, lat: loc.Latitude, lng: loc.Longitude } }); if (res.success || res.status === 'success') state.pendingLocations = state.pendingLocations.filter(p => p.ID !== loc.ID); } catch (e) {}
                }
                await fetchLocations(state.currentProjectName);
                showMessage("ซิงค์ข้อมูลสำเร็จ", "success");
            });
            on("exportCsvButton", "click", () => {
                const data = [...state.savedLocations, ...state.pendingLocations]; if (!data.length) return showMessage("ไม่มีข้อมูล", "warning");
                let csv = "\uFEFFUser ID,Survey ID,Lat,Lng,Timestamp\n";
                data.forEach(d => csv += `${csvEscape(d.EmployeeID)},${csvEscape(d.SurveyID)},${d.Latitude},${d.Longitude},${csvEscape(d.Timestamp)}\n`);
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })); a.download = `Export_${state.currentProjectName}.csv`; a.click();
            });
            on("home-button", "click", () => { showView("project-selection-view"); loadSelectionView(); });
            on("project-search-input", "input", (e) => {
                const q = e.target.value.toLowerCase();
                const filtered = state.allProjects.filter(p => p.toLowerCase().includes(q));
                dom.projectList.innerHTML = "";
                filtered.forEach(p => {
                    const card = document.createElement("div");
                    card.className = "project-card p-5 flex items-center space-x-4 cursor-pointer group";
                    card.innerHTML = `<div class="w-11 h-11 rounded-xl bg-slate-100 text-slate-400 group-hover:bg-blue-100 group-hover:text-blue-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-folder-open"></i></div><span class="flex-grow font-bold text-slate-700 text-left leading-snug">${safeText(p)}</span><i class="fas fa-chevron-right text-slate-200 group-hover:text-blue-500"></i>`;
                    card.onclick = async () => { state.currentProjectName = p; dom.trackerTitle.textContent = p; showView("tracker-view"); initMap(); await fetchLocations(p); };
                    dom.projectList.appendChild(card);
                });
            });
            on("password-form", "submit", async (e) => { e.preventDefault(); try { const res = await apiPost({ action: "verifyPassword", password: document.getElementById("password-input").value }); if (res.success || res.status === 'success') { dom.modals.password.style.display = "none"; document.getElementById("password-input").value = ""; showView("admin-menu-view"); } } catch (err) {} });
        }

        function cancelEdit() { state.editingId = null; clearMarker(); dom.surveyIdInput.value = ""; applyEmployeeIdState(); document.getElementById("editActionButtons").classList.add("hidden"); document.getElementById("normalActionButtons").classList.remove("hidden"); renderAllData(); }

        async function loadSelectionView() { setLoading(true); try { const res = await fetch(`${WEB_APP_URL}?action=getProjects&t=${Date.now()}`); const result = await res.json(); state.allProjects = result.data || []; renderSelection(state.allProjects); } catch (err) {} finally { setLoading(false); } }

        function renderSelection(projects) {
            dom.projectList.innerHTML = "";
            projects.forEach(p => {
                const card = document.createElement("div");
                card.className = "project-card p-5 flex items-center space-x-4 cursor-pointer group";
                card.innerHTML = `<div class="w-11 h-11 rounded-xl bg-slate-100 text-slate-400 group-hover:bg-blue-100 group-hover:text-blue-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-folder-open"></i></div><span class="flex-grow font-bold text-slate-700 text-left leading-snug">${safeText(p)}</span><i class="fas fa-chevron-right text-slate-200 group-hover:text-blue-500"></i>`;
                card.onclick = async () => { state.currentProjectName = p; dom.trackerTitle.textContent = p; showView("tracker-view"); initMap(); await fetchLocations(p); };
                dom.projectList.appendChild(card);
            });
            dom.projectCount.textContent = `${projects.length} โครงการ`;
        }

        window.onload = () => {
            if (initLeafletResources()) {
                setupListeners(); loadSelectionView();
                on("manage-projects-btn", "click", () => dom.modals.password.style.display = "flex");
                on("cancel-password-btn", "click", () => dom.modals.password.style.display = "none");
                on("confirmActionButton", "click", () => state.confirmActionCallback?.());
                on("cancelActionButton", "click", () => dom.modals.confirm.style.display = "none");
                on("menu-back-to-selection-btn", "click", () => showView("project-selection-view"));
                on("customizeLabelsBtn", "click", () => { document.getElementById("employeeIdLabelInput").value = state.customLabels.employeeId; document.getElementById("surveyIdLabelInput").value = state.customLabels.surveyId; dom.modals.customize.style.display = "flex"; });
                on("cancelCustomizeLabelsBtn", "click", () => dom.modals.customize.style.display = "none");
                on("customize-labels-form", "submit", (e) => { e.preventDefault(); state.customLabels.employeeId = document.getElementById("employeeIdLabelInput").value || "ID พนักงาน"; state.customLabels.surveyId = document.getElementById("surveyIdLabelInput").value || "ID สำรวจ"; localStorage.setItem('customLabels', JSON.stringify(state.customLabels)); updateAllLabels(); dom.modals.customize.style.display = "none"; showMessage("อัปเดตแล้ว"); });
            }
        };
    </script>
</body>
</html>
